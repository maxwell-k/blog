on: # yamllint disable-line rule:truthy
  push: { branches: [main] }
  workflow_dispatch:
jobs:
  deploy:
    # yamllint disable-line rule:line-length
    uses: getpelican/pelican/.github/workflows/github_pages.yml@3c69dc68d25a761911697467c765a16e68915c74 # 4.12.0
    permissions:
      contents: read
      pages: write
      id-token: write
    with:
      settings: pelicanconf.py
      requirements: --requirement requirements.txt
